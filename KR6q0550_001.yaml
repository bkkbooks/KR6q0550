body:
  text: 嗣法門人智遠等編住彝陵州黃陵月峽禪院語録康熙丙午歲師受參府傅公遊府魏公請住黃陵月峽禪院語録山門師以杖指門云門開八字路設一乘孤迥迥廓似太虛洞玄玄明如杲日山僧今日到來且道入門一句又作麼生驟步云舉步直超千聖外十方世界總毗盧禹殿聖矣哉功匹河山大矣哉德同天地山僧今日遭逢佛法從斯肇起咦不是神通妙用實乃法爾如然佛殿佛身克滿於法界普現一切群生前目顧左右云見麼目似青蓮面如滿月展具便拜據室據此室行此令顯佛祖家風開人天正印要識吾宗格外機杖頭有眼明如鏡上堂於傅公手中接疏示衆云者個是昔日靈山會上付囑國王大臣的落在我傅公手裏山僧不敢囊藏拈來當陽揭示諸人會麼若也會得不須重說偈言其或未然卻請維那宣過法座者個蘇迷盧座巍巍然無見其頂蕩蕩乎莫測其涯山僧到來作麼可上卓杖云幸有山形拄杖子昂然扶上寶華王遂升拈香云此瓣香經塵沙劫而不朽歷億萬年以常新爇向爐中端為祝延今上皇帝聖躬萬歲萬萬歲伏願聖祚彌隆逾劫石王畿永固越塵沙再拈香云此瓣香雖無聲臭卻有宏為放去太虛莫能載收來毛竅可藏身爇向爐中奉為滿朝文武闔國公卿並本府本州當道尊官惟願生生作國家柱石世世為法道金湯次拈香云此瓣香拳踢相應過犯彌天棒喝交馳冤深逾海爇向爐中供養我現住夔府百福山天圓堂上傳臨濟正宗第三十三世耳毒先師太和尚用酬法乳之恩斂衣就坐維那白椎云法筵龍象衆當觀第一義師卓杖云蕩出扁舟劈浪斜飄然徹透碧光華以杖作釣勢云直饒四海金鱗也一釣從茲不困沙衆中有透海者麼出來與山僧相見僧問覿面相承請師著棒師便打僧便喝師云上座猶有根塵在僧擬議師云徒遭點額歸問和尚升堂說法即不問如何是黃陵境師云嵐煙翠折峰橫挂碧海漩流岸曲斜進云如何是境中人師云八面玲瓏四海客十方透脫五湖僧進云人境俱奪時如何師云可惜林巒裏無人問落花僧佇恩師打云龍頭蛇尾漢乃云立教明宗活捉龍蛇手腳乃能直下承當安邦定國生擒虎兕機關方可全身擔荷所以祖師心印狀似鐵牛之機去即印住住即印破只如不去不住印即是不印即是於斯擬議錯過三關少涉思惟白雲萬里致使三世諸佛半放不下歷代祖師全提不起一大藏教詮注不及伶俐衲僧自救不了正恁麼時作麼生履踐喝一喝云振奮吒沙無向背爍迦羅眼不能窺雖然如是幸參府傅公夙承佛記久種靈根在在新圓覺伽藍處處建祗園精舍率衆復修大悲樓閣觀音聖像敦請山僧升此寶座大展華嚴法席闡揚微笑宗風指入毗盧性海洞開樓閣院門俾塵塵剎剎無不明然物物頭頭悉皆顯現所謂色心不二空有齊彰理事圓融一多無礙祝一人有慶祈諸宦多祥如是功勳且置謳歌帝力一句作麼生道大朝天子坐明堂四海生靈盡安枕結椎云諦觀法王法法王法如是下座上堂明明歷洞玄玄杳無聲臭闊無邊徹底搜尋無一物有何佛法與君傳雖然只得丁一卓二放兩拋三向無言處形言無相中設相驀豎拄杖召衆云會麼若能物我渾無礙剎土無非是佛身亭珮鄒公誕辰請上堂仔細思公果異然端於火內種青蓮只饒烈焰猛風起華更馨香色更鮮今日是我鄒護法初度之辰請山僧升座舉揚個事正所謂處塵勞而作出世功勳居火宅而獲清涼道果在在助揚法化處處輔弼宗猷王事佛事並行君恩親恩共報山僧別無所示憑拈七尺烏藤發明本地風光亦爾因齊慶讚卓拄杖云會麼從斯不變入元常永證金剛無量壽樂登科居士披剃請上堂問盡大地是學人一隻眼盡乾坤是學人一卷經念到水窮山盡處時如何師云且道轉身句看僧作禮師云忘前失後漢乃云昨是俗流今是僧翻然換轉舊時人方袍圓頂從斯著八難三途更不侵如是則知樂氏子宿秉靈根具大智力頓脫塵勞而直超物外踏翻苦海而直證菩提有如是因獲如是果豈小補哉雖然猶有向上一路在作麼生是向上一路聻良久云行到水窮處自有轉身時結制上堂黃陵堂上弘開爐鞴揮龜毛拂談空說有握兔角杖打雨敲風重重露布種種蔓延外無他說總之欲諸人將歷來無明種子業識根芽盡情拋向大冶紅爐之中一火頓淨絲髮不存成一箇空空洞洞的物件活活鱍鱍的東西隨高隨下無彼無此處虎穴魔宮之中不起畏心居梵宇瑤池之上不生喜念如木如石如山如水不但與天地同根萬物一體上與諸佛同一鼻孔遼天下與衆生同一腳跟點地到個般田地方可言結言解其或未然各依本位念茲在茲始得且道兩頭截斷中道不居一句作麼生道披簑獨立千峰外引水澆蔬五老前上堂真空湛寂無臭無聲一性圓明無餘無缺為甚諸人不能直下承當去休將閒學解埋沒祖師心佛成道日傳戒上堂正眼當陽明如杲日真柔格外廓似太虛只得峭峗峗玲瓏八面孤迥迥透徹十方致使深機莫能考究千聖無以比倫把住諸法無遺普令群英有作今世尊成道之辰乃諸人圓戒之日黃陵不敢囊藏故爾和盤托出驀豎拄杖召衆云會麼萬里神光頂後相雪山南面是阿誰念一唐居士請上堂冰河發焰洞明劫外真風陸地蓮敷香遍大千世界所以根深蒂固流遠淵長故於宦海之中了知夢幻空花文字堆頭撥出本來面目特入山中請山僧升座發明靈山奧旨揭示少室宗風山僧只得將無作有應物隨機驀拈拄杖卓一卓云會麼無法與君堪對說惟憑此個作單傳復卓一卓下座解制度一居士請上堂問結制已前即不問解制一句作麼生師云不費纖毫力始末一時收進云解制後如何師云徐行踏斷水流聲縱觀寫出飛禽跡僧作禮云謝和尚指示師云逢人切莫亂舉乃云怪哉一夜降濃霜草木昆蟲盡著忙獨有黃陵拄杖子搖唇鼓舌話郎當說到一切法無解一切法無結恁麼說話大似孟八郎何以故雖大圓鏡中無解無結且建化門內有合有開況拄杖子在山僧手裏所以把住放行惟在我縱橫殺活豈由他如斯解結得明開合得所方可握上上鉗鎚用衲僧巴鼻處處烹佛煆祖方方洞智化愚使一切人返本還源歸根得旨則不孤談居士千里來山供衆請山僧登曲彔木床彈沒絃琴歌無生調共樂升平敢問大衆風清古格即且置聖制告圓一句作麼生道彈指圓成八萬門一超直入如來地解制天圓本師命專使至上堂把住要津不通凡聖截斷衆流豈容走作所以童龍難徹底雛鳳易迷巢今日幸我天圓古佛起大慈悲廣設伊蒲命某甲升曲彔木床彰殊勝境向人天衆前略露些子只得揮太阿劍擲無孔錘將生死根株一刀兩段明暗窠窟一鎚粉碎只教八面通明十方洞徹以大千界為伽藍恆沙國作法席優游自在豈不暢快何必區區以長期短限相為拘執者哉不見道東勝神州射箭西瞿耶尼中垛縱有如是奇特且拈向一邊且道為衆解制一句作麼生道揮拂子云殷勤為解丁香結放出枝頭自在春下座佛成道日上堂昨夜迥然一事奇鷲峰𨁝跳上須彌剎塵透入剎塵去天上人間總不知所以世尊三昧迦葉不知迦葉三昧阿難不知至於開堂演教尊宿三昧諸人不知惟佛與佛乃能知知山僧不惜眉毛再三舉似昨夜世尊睹明星悟道發顛騎鷲峰向諸人鼻孔中出出入入周旋往返復向拄杖頭上回觀大地衆生即高聲歎云奇哉一切衆生皆有如來智慧德相只因妄想執著不能證得者老漢恁麼說話大似壓良為賤山僧忍俊不禁只得震威一喝滿面慚惶倒退而去不見道心佛衆生三無差別詎出此語耶也是則雖似似則未是何也梅須遜雪三分白雪卻輸梅一段香住大悲禪院語録康熙壬子年師受本州文武紳襟等請創建秭歸佛興山大悲禪寺語録上梁上堂拈香云此瓣香非天地所産是一無手人攜一無底藍子直入無影林中採來結而為雲蓋覆三千世界化而為雨普滋大地衆生爇向爐中供養本師釋迦牟尼佛大悲觀音大士致祝當今皇帝萬歲萬萬歲皇后齊年太子千秋闔國公卿滿朝文武本府本州大護法文武縉紳諸大檀越惟願壽山聳翠挂當陽福海騰波橫大地斂衣就坐白槌竟師以拂子指空云盡虛空是一重大悲殿遍法界是一尊大悲像其殿之闊也莫測其涯其像之高也無見其頂羅十虛而無盡包三界而有餘十方碧落為門百億須彌作陛日月為燈千古長明不夜雷霆作鼓四時普振中天其大悲大人端居其中乘悲願力現百千億身一一身具千百億手眼一一手眼執千百億器械一一器械有千百億作用隨緣赴感應現無窮或以宰官身得度者即現宰官身而為說法或以長者居士童男童女等身得度者即現如是身而為說法徹底老婆心古今無間歇怎奈法大機小而不領悟山僧忍俊不禁只得向大中現小小中現大將無作有將有作無於殿中起殿門內安門從無見頂相中現一尊有見頂像使人睹像生善易入其門如是建立則不辜我副府州侯二位大人率領通州文武諸大檀越於斯捐金鼎建盡力維持成千古名藍作萬世規模試問大衆如何是建立一句古剎重開敷五葉傳燈千古更新名下座進新方丈小參此剎永為諸佛坐山僧權借一枝棲惟冀慈光恆攝授悉令衆善獲菩提以拄杖卓一卓云向此居行此令何憂魔佛不歸正七尺烏藤任縱橫十方剎海悉安靜忽若金鱗攫霧來當頭一棒開心印驀豎拄杖云且道者個具甚威光便有如是行徑復卓杖云咦莫怪他家得自由從前曾竭於明聖佛成道日衆居士請上堂舉拄杖云山僧毫無佛法憑這烏藤打殺有不顧危亡者麼月幢問和尚升堂即不問世尊成道作麼生師和聲一棒云不唧溜漢月即喝師復打月又喝師又打云再喝一喝看月拂袖歸位問如何是本分事師卓杖云覿面相呈進云此事不在內外中間畢竟在甚麼處師打一棒云且道在甚麼處問如何是萬法歸一師云天上有星皆拱北進云一歸何處師云人間無水不朝東問有一金毛師子露爪張牙請和尚看師云者畜生惟一趙居士問承和尚開示把生死貼在額上弟子眼看不見耳聞不著和尚又作麼生指示師云翻轉面門腦後觀乃云釋尊昔日太郎當皇宮不住入山藏若無夜半明星出六載空教臥雪霜雖睹明星而了悟真常觀大地而圓融性體仔細推窮未免一得一失何故金屑雖貴落眼成翳所以雙放雙收全明全暗致使數千年來猶令人檢點衆中有梯天撥路者麼如或袖手旁觀不惟辜負己靈亦且埋沒先聖今幸衆居士宿植德本叨成佛記處塵勞而深信此事握慧劍於五欲七情之中一斷一切斷剔心燈於暗室之內一明一切明所以眼不求色舌不求味素食靜居陶然自樂今乘世尊成道之日恭詣大悲座下香焚牛首燭點蘭膏請山僧升座葛藤聽取一頌群英斂念越城西適遇如來成道期以此觀之為預兆當來必獲佛菩提送敏樹辨堂二位師翁牌位入祖堂上堂以拂子拂一拂云敏師翁辨師翁二老相將出海東到跨須彌歸劫外雲山隔斷幾重重如是則見之不見逢之不逢只得握兔角杖擊碎千重鐵壁揮龜毛拂掃清萬里煙雲致使智鑑圓明了無礙隔真空湛寂迥絶倪端直饒那邊更那邊不可說不可說無邊香水海浮幢王剎不出山僧這拂子頭上所以我慈雲老人有經天緯地之才出入縱橫於楚蜀滇黔一條白棒打雨敲風兩片唇皮訶佛罵祖處處開人天眼目頭頭露佛祖宗猷享壽八九堂開六七至化緣已竟即登座說法而逝我辨堂師翁髫年出俗披剃於京都戒壇孤身萬里參遍諸方放下腰包橫眠十字等觀音之慈心行普賢之願海春秋七十有餘臘坐四十單四一日跏趺坐脫試問大衆即今拈香上供已畢且道二位師翁是已涅槃是未涅槃若道已涅槃是謗若道未涅槃是誑且作麼生道還悉麼幾度白雲空聚散銀河斗柄未曾移浴佛上堂但臨此際於諸剎盡把香湯浴悉達惟我大悲則不然願拈海水驀頭刷何故佛真法身猶若虛空豈以杓水而能浴哉所以大悲以大地作盤須彌為寶座裁白雲作淨巾將無邊剎海為香湯信手拈來徐徐傾出通身遍身透頂透底眼裏耳裏徹上徹下爪齒毛髮俱已磨光刮垢足頂臀腋盡皆洗滌蠲塵致使三百六十骨節節節光明八萬四千毫竅竅竅洞明老大世尊被者一浴即現大人相湧身向山僧拂子頭上周行七步目顧四方大衆見麼一手指天一手指地道天上天下惟吾獨尊大衆聞麼脫或不見不聞則背覺合塵當面錯過去也驀豎拂子云這個聻復以拂子敲禪案三下云萬古碧潭空界月再三撈摝始應知下座上堂歸真了妄實然奇恰遇大悲成道期錦浪競搏金焰影緑楊搖映白蓮池隨緣赴感悲無盡救苦尋聲願不移速把未生前面目趁斯諦當好修持即今覿體相承試問大衆會麼良久云切忌漏逗便下座聖一自修比丘尼剃髮請上堂去髮蠲塵事匪輕俄然轉作丈夫身從茲再不潛閨閣直上菩提路上行急參究莫因循切須識取本來人試問大衆即今法法昭然頭頭顯露金猊吐焰長明不夜之光玉鴨銜煙恆篆不雕之印眉目宛然見聞不昧且道喚甚麼作本來人一僧云覿面相呈師云認著依然猶隔海新戒請上堂戒之一字不尋常三世乘此證寶王若論甚深無上戒百千萬億舌難量衆中有能量者麼西堂問三世諸佛即不問目前一句作麼生師云照膽蟾光沉碧漢進云如何是秭歸境師云拍天滄浪浸須彌進云如何是境中人師驀頭一棒僧一喝師云臨濟兒孫猶在乃云戒月騰輝徹照豈離於性體禪天寥廓包涵無外乎心宗所以地天無外此而函蓋王臣無外此而定鼎士庶無外此而修身草木無外此而長養諸佛無外此而紹續歷祖無外此而傳持尊宿無外此而接物山僧無外此而利生諸人無外此而受戒敢問大衆且道無外個甚麼以拂子擊案云海神知貴不知價留與人間光照夜鏡一披剃請上堂以拂子召云鏟除鬚髮不尋常迥然出俗入僧堂大悲千手相摩囑頓釋多生纍劫殃纍劫殃若冰霜只須窮究眼前法切勿參差心上光莫倉惶坐臥經行偷眼覷營為動作暗中詳倘然識得無生忍始獲名傳於楚湘上堂橫按拄杖云太阿橫按迥絶端猷復打圓相云寶鏡臨臺舉無移照何況大雄始建爐鞴初開必須丁一卓二豈肯就四將三鉗錘惡辣鎔銅瓶叉釧作一金妙密神機攪酥酪長河為一味致使純清絶點百煉精金轉穢邦成淨土化火宅作蓮池永為金剛道種般若根芽如是則不辜負山僧抱病升堂向曲彔座上與汝等東語西話直要汝透第一義試問大衆即今地迥天高山青水緑日月交輝森羅顯現喚甚麼作第一義衆無語師喝一喝下座因事上堂古德云施主一粒米重如須彌山若還不了道披毛戴角還試問大衆且道這一粒有多少斤兩便道重如須彌又云披毛戴角所以雪峰在溈山處作米頭一日溈山入碓磨房云莫拋撒十方信心峰云某甲不拋撒山於地上拾一粒米云莫輕這一粒百千粒從這一粒生峰云且道這一粒又從甚麼處生山低頭歸方丈即上堂召衆云食須仔細米裏有蟲然這二大老互相愛敬無非為檀越信心行人脂膏儂夫血汗誠恐諸人恣縱放逸不能了明己事償他宿債故爾叮囑今日老僧亦有一偈告諸崑衆莫依稀常住絲毫當重之茶飯三餐檀信脂水薪二事行人皮只宜培補來生福不可輕拋後世基不信但看牛馬畜償他宿債苦難啼佛成道上堂法幢問世尊成道即不問如何是佛興境師云雲樓月殿萬山阿進云如何是境中人師云曲彔水床千指繞進云奪人不奪境時如何師云細㓟明月洞林煙進云奪境不奪人時如何師云手握清風揮遍野進云設若人境俱奪時如何師云物我渾忘大夜中進云人境俱不奪時如何師云焦桐席上彈真諦撾鼓村中演妙音進云人境已蒙師指示殺活全彰事若何師驀頭一棒云且道是殺是活幢拂袖歸位月幢問世尊成道已久今日大悲殿中現像一句作麼生道師云雪壓竹枝千點翠進云目前境界事如何師云煙籠怪石一堆雲進云像雖如是且道正法眼衲僧作麼生見師打一棒月一喝師云好喝即不無正法眼作麼生見月禮退問世尊成道是如何師云劍為不平離寶匣進云和尚升座作麼生師云藥因救病出金瓶進云世尊和尚且道是同是別師云雪月梅梢鶴進云恁麼則不別矣師云墨煤夜半雞惟一居士問四面無門時如何師云好個消息士云八方無路時如何師云轉過話頭來士云望和尚指示師豎拄杖云向者裏薦取乃云大道虛玄函天蓋地真機密運罩古羅今日月難並其明太虛豈此其量大而無外渺莫邊涯細而無內毫無縫隙超城芥而不古歷拂石而匪今所以我大覺世尊久遠劫來成等正覺豈待今日睹明星而成道也然雖如是白雲乍可來青嶂明月難教下碧天傳真上堂以拂子拂一拂云四大本空五蘊非有縱有丹青無處下手所以者個事隱微幽寂妙奧遐深絶相絶名無把無鼻佛眼莫可覷魔外豈能窺卷舒收放了莫端倪聞見覺知絶無依倚不但紫雲范公設若吳道子張僧繇到者裏亦無下筆處只得向第二門露頭露面任伊淡描幾筆以遺於後然雖如是傳得吾色身難傳法身何也妙湛明圓空色相看渠何處可名模小參結制小參叨居法位已多年究竟未曾出一言不是不言言不得誠聞怠惰反生愆何故蓋此一事最玄最妙無鼻無把所以中下根信相半行說全虧致使愈覺愈頑轉凡轉昧者多矣不見一古德於三乘十二分略頗粗知只是不持戒律一尊宿問云如何不持戒答曰不戒而戒不持而持遂招報墮牛中一日拽車至爛泥裏難行尊宿近前喚云法光牛即抬頭尊宿徵云何不道拽而非拽牛自覺知便墮淚暴跳而死故世尊云我寧不說法者蓋為此也然山僧又不忍恁麼去只得權實互興正遍兼帶故設音聲道場開演無邊妙相復建不語禪席洞明劫外真空如斯建立別無他說總欲諸人心心契證元常步步踏著實地於諸相夾雜之中絶不沾染向聲色混融之際毫無繫縛成一個乾淨淨的物件潔白白的東西明如杲日廓似太虛到者裏方可紹續宗乘聯芳佛印在在顯勝身處處彰妙淨不以凡聖相隔不被生死相拘出入自由卷舒自在豈不暢快也耶何必區區以此世務為念而不以此事為要哉諸人者音聲之道雖明無言之旨猶未曉在今夜乃結制之初欲與說明惜山僧口門窄儘力道不出只得舉則公案與諸人體會看昔世尊在座一外道請益云不問有言不問無言望世尊大垂悲憫世尊默然外道即禮謝云承世尊大慈大悲開我迷雲令我得入諸仁者外道秪恁麼問世尊秪默然因甚麼外道即悟去試體會看如體會得出可謂古今一道理事一揆脫或未然東土衲僧不如西天外道去也小參若論此一事人人本有個個不無既人人本有個個不無因甚麼又道百姓日用而不知者何也蓋為諸人自迷真逐妄已來將此一事汩沒於五欲七情之中見聞聲色之內從生至生從劫至劫浸染濃厚竟不得灑然故我佛佛出世祖祖西來無非為此一事然此事不在別處就在汝諸人從朝至暮喫飯穿衣處迎賓待客折旋俯仰處屙屎放尿運水搬柴處乃至一呼一吸一動一靜處諸仁者但折旋俯仰處著眼回光返照看者喫飯穿衣迎賓待客運水搬柴乃至一呼一吸一動一靜底是個甚麼物在中間鼓舞在中間搬弄使人七顛八倒頭出頭沒若向間中認得真把得定勿使他走作一纖毫動搖一絲髮然後行則同行住則同住坐則同坐臥則同臥一即一切一切即一到者裏方可以坐微塵裏轉大法輪於一毛端現寶王剎雖然猶未是衲僧向上事在試問諸人且道如何是衲僧向上事轉身云霜天月落夜將半誰其澄潭照影寒為左部王檀越對靈小參來無蹤去無所一道神光淨裸裸天上人間任縱橫海雲露布實難裹羅十虛似粟顆一鎚擊碎太虛空萬象之中獨露我雖然如是切不可以形色觀所以崑翁王檀越得此三昧現大身於閻浮提內種佛果於劍戟叢中廣建橋梁度人度馬重修殿宇供佛供僧致使神人共慶真俗同歡及至世緣已畢踢起便行一夕之間即生淨上適然聞山僧說話即向拂子頭上巍巍然彰殊勝境作奇特事與諸人相會了也且道諸人見麼於斯見得則知從上諸佛歷代祖師安身立命處若知從上諸佛歷代祖師安身立命處則知自己一段靈光安身立命處既知自己安身立命處則知我大檀越生亦未曾生死亦何常死譬如淨月輪遍界隨居止敢問大衆且道王大檀越即今向甚麼處居以拂子拂一拂云妙嚴清淨土穩坐白蓮花參府傳公請為楊二夫人對靈小參圓陀陀光皎皎亙古亙今常不老雖然露布海雲遮恰是金烏透碧沼故古德云處生死流驪珠獨躍於滄海踞涅槃岸桂輪孤朗於碧天如是孤迥露布海雲而安可遮障者哉所以歸天夫人來於明歸於清歸去來兮未著塵竹影掃階猶有跡冰輪透海杳無痕敢問諸人既來去分明了無痕跡且道楊夫人一段真靈即今端居何所良久云清虛湛寂無聲臭要識真宗覿面看千府黎公請為王夫人對靈小參以拂子打圓相云圭月初圓輪玉宇金風乍扇試靈霄地軸天關誰撥動卻令木葉滿空飄所以秋色澄清乾坤肅殺風出瀟然炎涼變改致使蛩吟幽砌雁淚長空一一七穿八穴明明百匝千重以此觀來正是王夫人歸根之際復命之時故爾請山僧對靈小參舉揚個事令生益死安敢問大衆且道王夫人者段真靈即今向甚麼處去也以拂子畫相云露柱分明無向背更於何處覓燈紅守府王公請為夫人對靈小參幾回生幾回死生死悠悠無定正自從識破了無生於諸榮辱何憂喜雖然如是也要同道者方知同德者方證坐中有同德同證者麼如有則知王夫人歸根復命處若知王夫人歸根復命處則知自己一段大光明藏無減無增輝騰今古橫遍十方如是奇特則且置且道夫人畢竟向甚麼處安身立命卓杖云從茲掣斷黃金鎖一道神光遍大千參府傅公發夫人柩歸請對靈小參頓卻塵勞意極端徹然直下彩雲鸞雖居那畔威音外不出諸人覿面看既居威音那畔因甚麼又覿面相看不見道無邊剎海自他不隔於毫端十世古今始終不離於當念如是則知升天楊夫人生亦未曾生滅亦未曾滅猶如淨月輪隱顯俱明徹所以處塵勞而作大佛事居宦海而作大功勳仁慈隱惻惠物洪深便能福慧齊修致使軍民共戴及至世緣已畢離塵垢而生淨界棄異地而歸故鄉如是完備即且置且道西歸一句又作麼生委悉麼閻浮樹下親修得九品蓮中妙果圓為州牧胞兄明甫王公對靈小參以拂子指空云遙憶甫翁千里隔回眸即便在當然昔雖未悟而今悟覿體堂堂不動遷不動遷步步高登極樂天試問大衆既不動遷因甚麼又高登極樂不見華嚴經云東方入定西方出南方入定北方出所以我甫翁大人來去自由縱橫無礙不動步而高登極樂未舉念而周遍大千捨此生彼脫凡證聖即此西歸一句作麼生道從茲迥脫根塵去直透威音更那邊儒學范巽公請為母對靈小參師以拂子豎起云來無形去無影地厚天高無見頂來去分明渺莫知徒將血淚沾衣領急參尋莫待冷免教梧葉砌寒井幸值大悲千手提俄然迥出萬重嶺翻身直入淨居天得證無生真法忍法語示方勝禪者然此一事外無別說只要於日用動靜之中刻刻提撕時時檢點看這穿衣喫飯誦持禮拜的是個甚麼消息向此中疑他一疑到見執情忘言思路絶處不待擊而虛空粉碎不須踏而大地平沉得到者裏不惟納河海於蹄涔亦可以擲大千於方外也珍重示乾齡王居士世尊拈花示衆達磨航海西來無非為此一事然此一事明如杲日廓似太虛蓋為汝等將此一事撇向一邊斷不說著遊戲於聲色之中脫灑於見聞之際如膠似漆竟不得自由自在隨處隨安如斯之輩深可痛惜幸汝決不如斯所以親近知識助揚法化雖然不可得少為足要將生死二字貼在額頭上朝也如是參暮也如是參行也如是參坐也如是參乃至揚眉瞬目一卷一舒亦如是參參得年深月久自知生死去處若知生死去處則知佛祖根源既知佛祖根源人間天上任汝往來虎穴魔宮隨伊擺手縱閻老子百千里外看伊無分又有何生死之可慮哉示歸源宋居士古德云此一事不在內不在外不在中間試問居士既不在內外中間且道在甚麼處可去二六時中著衣喫飯處回光返照看者一動一靜一往一來在內耶在外耶在中間耶一一檢點看如檢得出與諸佛同一鼻孔遼天諸祖共一腳跟點地其或未然毫釐有差天地懸隔示弘玄道人踏盡溪山參遍知識無非為者一著子然者一著子在汝腳跟下放光動地頂門上耀古騰今蓋為汝不覺知汝若覺知踢起便行開口便道與諸佛諸祖無二無別又何必向人門戶求涕吐也珍重示融一監院監院於方丈禮云乞和尚一語以垂於後老僧云法語者乃修行之法則也汝既為監院必要起早睡晚料理常住廢寢忘餐了明己事可也設若依稀而道理未明倘如忽略而因果不識則未免流入巨浸不見一僧於門外忽逢二鬼現前便云奉大三差來取長老僧云我乃寺中監院有院事未明惟乞轉訴待我七日將院事交待即來其鬼便去僧回寺晝夜苦參於七日後二鬼尋覓不見倘汝有如是志力如是勇猛方可離諸苦趣而高登極樂矣致囑致囑示疑悟禪人然此一事脫體現成絶不淆訛毫無蓋覆只為不肯發大勇猛起大疑情卻去文書刪子上搜尋殊不知文書刪子上無向舌唇口角邊討論殊不知唇舌口角邊無向朝山謁海訊南走北處懇求殊不知山南海北處無向凝睛定目黑山鬼窟裏窮究殊不知黑山鬼窟裏亦無既一切處都無且道甚麼處有聻設有向甚麼處著參
