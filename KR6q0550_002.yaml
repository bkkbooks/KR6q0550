body:
  text: 嗣法門人智遠等編示鏡一禪人鏡一乃峽州人也始而月齊次而長素至於客臘必欲出家受戒為大悲眷屬然此因緣非淺莫是有願於斯原是壽禪中人也所以因緣如是且置老僧更有一大事因緣付託與汝不惟老僧有安身之處縱過現未來亦有安身之處也再書一偈以志不朽無縫塔全仗伊就中風雨實難栖秪容日月穿心度不許閒雲挂上眉示全一禪人脫羅籠離窠臼如鳥之在天如魚之在水活鱍鱍洞玄玄而了無礙隔雖然如是既為佛子當行佛事然佛事者何三千威儀八百細行此威儀細行不出日用尋常穿衣喫飯揚眉瞬目一動一靜一呼一吸之間必須回光返照一一推尋看那裏是打失威儀處那裏是打失細行處如是檢點如是提撕致使通身遍身化為佛體左之右之無非佛事到者裏則不辜汝之苦志設若蒙蒙而興蠢蠢而食不過夢晝而已吾徒宜自勉之示自慶禪人出家一事外無他說總為生死事大無常迅速誠恐輪轉於六道之中無有丁日故爾割愛辭親離家別業特為了脫生死證聖超凡不是涉水登山遨遊海嶽必須親近一明眼宗師求個的當話頭或住雲堂或居淨室孤迥迥高豎脊梁峭巍巍壁立萬仞正恁麼時佛來亦不迎魔去亦不顧單單一味凝定眉目回光內照看者一動一靜一喜一怒底是個甚麼消息是個甚麼光境如是研磨將去無拘歲月莫論春秋一旦豁然貫通自是七通八達那時河海溪山不出汝之掌握矣示安石徒孫脫俗為僧離親割愛乃超凡入聖之徑路成佛作祖之階梯豈小補哉必當起尊重之心生難遭之想可也若是依稀看作平常終難成其大器必須形端表正袍方頂圓受師承之教訓依佛祖之洪規融通經旨了達心宗作個長老出來不惟十方檀信欽仰但汝一族悉得升天豈平常之事也勉之勉之機緣破白禪人參師云上座何來進云方前來師云方前幾載進云一共八載師云老僧者裏有個水上座可相會否進云相會師云有何言句進云無言句師振威一喝僧亦喝師云再喝看僧又喝師云真獅子兒能哮吼僧禮拜師便打頌古世尊拈花四十九年毫未露今朝何故太郎當和盤托出無人會笑倒頭陀白髮郎迦葉因阿難問世尊傳金襴之外別傳何物葉召阿難難應諾葉云倒卻門剎竿著二難本是一胎含花萼才彰落二三不是剎竿來倒卻金襴之下受瞞頇布袋和尚十字橫眠未定行常將寶物現諸人打開布袋無酬價憨笑癡癡直到今初祖會武帝離西特地過東來豪相巍巍擁帝階一見廓然云不識依然冷坐少林臺南山鱉鼻蛇象骨巖藏鱉鼻蛇通身紅爛起煙霞古今傷殺人無數獨有韶陽慣弄他雪峰示衆云大地撮來如粟米粒拋向面前漆桶不會打鼓普請看大地撮如一粟米十方諸佛何居止老胡才要說端繇一掌當門打落齒百丈野鴨馬師父子不尋常野鴨拈來便較量展翅才云飛過去和聲扭轉鼻根香百丈卷席順若欲彰殊勝境六丁六甲走如雷攢花簇錦將成段一陳東風盡捲回無縫塔地涵天覆足無涯擬欲描模轉見差無限春光藏裏許遭逢聖帝露些些百丈野狐不落野狐五百生野狐不昧出層雲參差一字輪千變何況長聯句未清文殊起佛見法見無孔笛逢氈拍板者場曲調古今罕若將耳聽眼聞聲定往鐵圍山下趕盤山示衆云三界無法何處求心四大木空佛依何住璿璣不動寂爾無言覿面相承更無餘事珍重三界無法何處求心孤峰獨鶴片月閒雲晴空一亙無邊畔山自高兮水自深興化古廟裏避雨不觀天色赴村齊掣杖途逢暴雨來雖避廟中衣未濕通身未免染泥灰巖頭因僧問古帆未掛時如何頭曰小魚吞大魚小小魚吞老大魚至今千古令人疑一回吸盡西江水猶是潛頭縮項兒巖頭因僧問浩浩塵中如何辨主頭曰銅砂羅裏蒲盛油銅砂羅裏蒲盛油擬鑒重增一個頭內外不知誰是主悲風千古使人愁雲門因僧問先師默然處如何上碑門云師師之一字若吹毛擬欲形言絶爾曹壁立長空寒萬仞月行無影寂寥寥雲門云火焰為三世諸佛說法三世諸佛立地聽火聚光中毫相輝十方三世振全威猛風疾焰法輪轉幾個能知向上機婆子燒庵風無葉動喜臨看雪染雲衣似未闡及至逢春花不發不由婆子不燒庵聯芳付月幢智深禪人從上惟叮勿斷流至余安敢阻行舟綸竿盡付與伊去巨浸鯨鯢珍重收付法幢智遠禪人佛云法法何曾法我道無無本亦無今付無無法與汝恆拈柏子祝皇圖付覺幢智洪禪人三級浪高也大奇揚身物外露全機雷轟電擊垂甘澤大地生靈始拜伊詩偈月峽吟出川乙巳年入楚蕤寶月一葉牧中流群峰勢挺特泊舟值故人延坐相留歇話極相投機堅留情太切門庭就此開爐韝從斯設禪暇嚼清風經餘坐石室風書水面文翠織山頭疊雨霄洞崇隆晴嵐穿砢穴峰斜澗必橫岸曲岩多折拍漢浪奔流稽天石亂疊懸崖猿似毬急水舟如葉澗竹筍斜生岩花果倒結灅麓怪崎嶇漁樵極古格衣栖木構藤飲釣江魚鱉峽外頂輪明波心清淺徹眠雲覆石霞漱石枕明月山苕帶露攀剪衲連雲截了無佛道成絶去聖凡學平等三世空至道原無說臘梅青娥巧妒白花神難動冰心一段真鐵幹聯雲撐野壑瓊枝帶露襯幽人雪風搖拽拖銀練花雨紛飛綴玉麈為結調羹滋味永高情故放占先春次聖可和尚鏡花水月二首湛寂清虛渺漠中涵容物我不私工單莖巧映雙枝碧獨體奇分兩面紅表裏無情情易合邊中有路路難通暗香隱隱招狂蝶致使鑽研訝不同又性極柔兮勢極堅能將霄漢浴冰盤光分萬派開銀鏡浪捲千江簇玉團顯矣無虧盈巨浸明然不昧燭狂瀾無分闊窄隨居上怎教渠儂意不珊次慈雲老人桃花韻陽和風暖景清奇濃艷新妝綻竹籬陌上映苔開笑眼堤邊襯柳擅芳姿親栽漢帝曾留意一見靈雲絶所思風送幽香聯我袂依筠詠作賞花詩次純陽先生水月韻月明移影映溪灣濃睡漁舟罷釣閒徹照壺天非浪塞通圓海岸豈堤關攝收萬派四溟水容納千峰三島山截浪明源窮到底絶無流水響潺潺溪路見梅雪嶺春催曉半開寒林花發果奇哉芳新翠迭興雲衲蕊氣煙浮動哲才蘿結路迷無客采棘縈崖斷少人裁幸而有鳥蛡霄去攀落花心幾片來中秋值雨情存此夜慶中宵卻到而今更寂寥驟雨凄清禪夢破飄風蕭瑟道心昭層雲掩翠和煙度薄露含輝帶露颻舉步欲窮天上月亭臺半是水來潮崖前佛閣峻曲峰斜雲亂堆懸空一閣自天開層巒聳翠通三島峭壁連霄壓衆嵬蘭谷浮香來猊座鵝溪疊浪上蒼苔雖聆暮鳥西歸去掉背樓南意不回尋梅忽地清香撲鼻邊乘風撥草幾回緣穿巖距石曾忘體剪棘披雲一顧顏雪臥峰深堅晚節根盤幽谷傲長年而今高吐枝頭上不惜東風有正權過孫公書院雲閣周遮紫蒂梅斜通一徑繞山隈石生若壘留雲臥樹長成柯待鳳來藤蔓倚松撐碧漢草竿覆石掩蒼苔他山雖有青蓮社怎似斯齊稱我懷病起嘯宇居士請益一病危軀懶話陪匡床兀坐冷如灰徑填木葉空塵跡體露金風絶點埃欲進竿頭猶有步擬臨撒手惜無崍而今得到安閒地一任時人競活埋乙巳歲得師訃一聽吾師報化圓頓令五內悉紛然腸回九曲思千里淚滴三山望百川若論祖風猶未晚何期佛日已先偏可憐西蜀三巴地燈録何人再續編華嚴期會大方廣佛妙無多百億分身一剎那寶網交羅縈法界鏡燈相照徹恆河浮幢剎自毛端建香水海從眉際過樓閣門開今正是何須苦向百城磨元宵金吾不禁元宵節玉漏停催不夜天燈貫琉璃明翠影花攢錦繡噴霞煙星橋廓落搖銀漢火樹高燒洞御筵凡聖於斯渾不二謳歌鼓腹慶堯年答我生羅公素食芳名知不群一瞻佳句勿虛聞如常平仄雖由我若定推敲必是君為惜經殘方就月因嫌衲破固留雲倘能儒釋無分別促膝何妨共論文壽慈雲敏師翁萬峰高出一峰斜險迅峞峨渺漠涯兔杖頻吞雲裏月龜毛常繫海中槎爐開百座鎔千衲法轉三玄雨四花若問慈雲老甲子河沙人數數河沙弔玉陽道人玉陽行徑自超然不待丹成返洞天藥臼罷春香有淚鼎爐終暖汞無煙蓬萊易近三千道弱水難親一葉船意欲相逢於芥孔誠然猶未達深玄山居誅茅覆屋倚雲間萬事輸人讓我閒爛煮野蔬嫌鼎窄深埋家芋喜爐寬采薪撥霧連雲去取水敲冰帶月還泉石灰心偏快活看來塵世似斯難又峰高峽迅冷煙浮盡日無人過此遊竹密斜通幽澗水松孤直翠碧雲頭山桃熟惹巖猿摘園栗落招穴鼠收及至客來無所奉烹茗話賞一輪秋建大悲寺大悲作用詎尋常演武場為選佛場不夜燈明千丈室無為穩座萬年床山泉滾滾來廚供香飯堆堆到客堂不二門開天地眼更於何物不中藏送州尊王護法燕雲密密布湖天草木森森俱煥然德澤恆滋回野性慈風逐扇啓甘泉枯桐席上彈仁政撾鼓村中謂法廉不獨士民歌大有更令釋道樂雍年送如翁周副臺衣錦還鄉妙出常終朝無事坐高堂呼童取餌將魚戲攜友彈琴動鳥狂倦至枕雲眠月窟興來琢句飽詩囊任他世外輪遷變棹背樓臺百不忙早春出行瘦笻倒卓步山前萬物回姿俱復妍春水涵嬌浮野翠女蘿帶媚動林煙錦簪蘭插鶯將語金線柳抽燕欲宣珍重遊方玩賞者於斯著眼莫徒然寺側見梅始創荒基盡剪裁何緣留得者枯梅霜侵老幹枝愈健雪壓新莖花更開瘦骨稜風香撲面饑膚抱月笑盈腮深窮來歷非常種必是天將壯法臺除夕示衆迎新送舊正斯時未審諸人知不知鳳曆初頒青嶂嶺鴻鈞始轉緑楊枝冰開池玉蒼梅綻雪化巖銀嬌烏啼惟有大悲拄杖子逢年遇節不分枝山居松針穿柳線蒲座補荷衣果熟山猿墮花開澗鳥飛泉幽聲細細岫遠影微微噪晚鴉投宿卷雲帶月歸又菴雖結上岑閒賞入中林翠斂花溪靜煙凝松壑深猿啼山月夜鶴淚澗雲陰萬象於斯寂昭然古佛心偈示面久禪人一坐如墻壁翛然萬慮忘於中討冷暖就此識存亡莫向頑空住休於死水藏直須活鱍鱍如日照當陽贈開池禪人山房雖寂寞寂寞卻相宜但種幾竿竹惟開一面池池清嬋出窟竹翠鳳來儀藉此為真境何須格外尋示惺衢大德長安大道更多奇衢路能通幾個知昨夜木人雲引路投明即到未移時示惺默大德語默圓融俱莫著一多無礙樂天涯草鞋踏破寒潭月竹杖橫眠碧底霞示惺凡大德心月孤懸耀碧天影分萬派絶中邊於斯把斷要津者立刻可超凡聖淵示明心禪者別云見性方成佛我道明心無佛成有佛成時終有壞無成佛處可長生贈九垓學者月皎波澄雅俊哉金鱗透海出頭來當陽一擊開心印際會風雲遍九垓示照遐禪者號妙圓智鏡明然徹邇遐妙圓何處不光華就中若解知端的剎剎塵塵是佛家示無涯諷華嚴經華嚴境界事何如百寶光中瑞色多向此若明諸佛意一毛頭上泛恆河示雲亭丹青休云個裏無聲臭莫道中間絶點埃萬里溪山藏筆底一天星月隱胸懷示正智禪人號遐修了明正智欲遐修撥轉竿頭入上流有時踏著無生地不用指開彌勒樓示登雲禪人號開修登雲涉險欲開修荊棘鏟除闊路頭若將大地平如掌方坐家堂始便休示行足大德若能識得菴中寶何必區區海外遊但得日輪東畔出霞沉碧落滿山頭示誠一禪人住山踏遍雲山始識山層巖轉折路途艱不如結個茅茨住渴飲饑餐枕日閒示休心大德掃地欲得前光皎皎卻拈苕帚殿中掃風塵觸動滿天飛千大悲按不到示君量居士從來個事太郎當珍重君家謾度量撥轉上頭關捩子大千無不露堂堂示覺賢居士心地融通徹性天了無佛法與君傳剎塵塵剎毫無礙八面玲瓏始覺賢贈慧幢禪人貧且亦堅未是奇老當亦壯實然稀山形拄杖與伊去八面通敲一任施號月幢禪人無邊香水浮幢剎一目澄然盡徹開露出珊瑚枝上月峭峞峞地逐徘徊贈破有禪人既破無兮還破有有無不立始能守與君一句道分明莫放無毛鷂子走號破白禪人英姿壯麗甚奇特破黑猶如能破白兩頭截斷不居中一喝當臺續祖脈示叢石禪人踏破芒鞋事若何奔南走北苦婆娑不如尋個安閒地淡飯充饑自在過示端一禪人必定不移於二路確然端坐斷千差有時觸碎娘生鼻一步高登五葉花示得安大德既披法服莫依稀聞見秪須珍重持若得一系毫不挂自然平地上天梯示味雲典座踏盡溪山意若何葛藤遍地正淆訛不如放下腰包好細嚼風雲滋味多贈傳心禪者滿十八今日妙年剛十八從斯增進周花甲山僧致祝不多言惟願汝心明似月示月宗不夜禪人桂魄澄然靄瑞煙長明不夜映中天不惟照徹威音外直透威音更那邊示湛一胡居士既欲了明向上機衆流截斷莫隨之一超直入如來地不枉甘貧吃淡虀示騰宇丹青無相相中有相有形形裏無形若要有無不著除非騰宇丹青次佛育王公水月韻澄然湛寂徹空清洞起泥牛逐妄情擬議欲吞吞不得長懷海嶽一輪明雪月交輝寒極難撐擬放眠地爐灰冷室幽然推窗始覺冰輪耀究竟無非一色邊出峽江風一葦出長川峽迅波浮噴碧煙一刻俄經峰十二無窮畫意入詩聯三珠石二龍吐出三珠石砥砫川江萬頃波卓然不是黃陵叟怎得疏通入楚河公婆石稍公稍婆是何緣卻不同舟各一天想是參商星所犯只容相見不相眠寄灼雲法弟卓錫雖然到別方絶無佛法可商量但將乾屎撅消息處處逢人謾闡揚哭奇枝姪孫奇枝折卻動高賢淚滴河山俱戚然秪謂老身先一著誰知汝去在吾前弔鏡天禪人湛湛長空一鏡天浮幢剎土一明然可憐露布海雲起明半邊兮暗半邊卜基江北江南未了休無如開創個山頭枕雲漱月千峰外一钁鋤煙不記秋建大悲殿獲殘碑數塊上載唐時名尤勝寺又宋時於乾道九年復改壽禪寺大凡作事貴無心若至無心道易親誰知上古壽禪寺千百年來又出興舟中冒雨一葦橫江逐浪遊無端風雨拍船頭垂竿不顧衣裳濕只欲金鱗來上釣壽大有嚴居士遙駕彩鸞銀漢裏倒騎瑞鹿錦城中大悲乘興同誠祝共慶長生不老翁壽天甫楊公兩岸山為雲老餅一江水作趙州茶信手拈來三祝敬惟祈福壽至無涯送陳居士還鄉八十翁翁轉故鄉鄉人一見盡驚惶卻來問是何方客鬚髮根根帶雪霜秋日壽李羅二居士江鶴風清飄木葉海山月白洞庭波滿天花甲難籌記一夜收來與李羅壽瑞芝羅居士岡陵鶴舞雲千片海屋籌添月一團松風嶺韻長生曲澗月溪吟太古絃副府州侯二大檀越遊玉虛洞兩大金湯步玉虛水同船也陸同車相將不獨流芳遠萬古聲名洞石渠浴佛值雨示智向李居士丹山獨步三山外向日葵開六合中為浴佛身傾法雨雲連海嶽地天通賀攀枝楊把總得子一天瑞氣浮青嶂四野祥雲繞緑楊試問往來何境界都云檀越獲仙郎送子容謝公方外知交正數年而今一旦欲分然頓使瘦腸回九曲不知何日復談禪中流聞猿啼一葉中流萬浪隨撥開三峽出幽危嶺猿徹底婆心切喚不回頭秪是啼值雪慶參府鳴翁長空密密太雲遮個裏何來妙極嘉莫是為翁丹詔至故令天界散瓊花燈月徹底寒潭月琉璃古殿燈兩輪相互照萬象悉分明佛事禮本師塔舉香云別師只謂歸來會誰謂歸來不會師數載寸腸回九結兜樓一片拜熏之所以群峰迭侍百佛團圞日月輪流不夜松風互喚無塵草木陳不盡之煙溪山獻無生之曲如是天機清妙又烏用不肖於斯灑掃者哉雖然如是只得向無塵地上楷塵無縫塔中開縫致使七穴八穿明如杲日透頂透底廓似太虛截群機於句下納萬象於臺前百千里外鞏固皇圖億萬斯年聯芳佛印敢問諸人光前裕後即不問且道先師靈骨端居何所以杖向空撥一撥云覿體湛然無向背何須格外覓蹤由與巖長老舉火拈火炬云不面未相逢相逢仍不面聊將一星火暗與汝相見即攛火炬云噁原來是個老修行何似去心忙似箭相伊意必欲西歸故把形骸來改變雖改變勿他念直須穩坐白蓮心莫謂紅爐火上焰辭世偈那畔者邊事孰知向茲未免悉懷疑老僧今日分明去坐斷兩頭中弗居既然如是即今者段光明向甚麼處咦手握金鞭問歸客夜深誰共玉階行塔銘古峽城髮弟子陳之夔頓首拜撰大道莫名名於何所衆生非相相於何著既以身心奉塵剎將朝三暮四應付無何有矣若復舉似舊面目遺災木石古人有靈難禁叱吒然水源木本之思固後來返報事此法幢禪師等老和尚純老人深以師德未酬法乳罔極而有塔銘之勒諄諄為豫告也豫素守諛墓之戒惟是法幢師身籍空門猶有仁人孝子一段懇切謹援筆以志其略按老和尚字純備諱廣德傳臨濟下第三十三世嫡孫先以托跡蜀土溯其世系蓋古渝豐都李氏裔甫六齡而怙恃兩遭失所固早信其假俗胎作人天出世楷梯逮少長也悲愍成性自具一種佛根及身許法王慨然以祖道為己任續燈受耳毒和尚擔荷重法倒抹陳積公案正法眼允矣三世諸佛所托命哉洎後卓錫吾楚疊建道場宗風郵播龍象騰集一時皈命恐後者不啻千二百五十人非惟佛法震搖國土抑其道味餌人故無遠弗屆云至乙巳而布具黃陵之月峽禪院實楚蜀一大勝地又苦於諸方結壇選佛乃在秭歸之城創佛興山建大悲寺與唐宋之尤勝壽禪古剎不謀重新比其時四大衆之嫻禮教固多而慓悍者更復不少自一親純和尚其高風逸骨饜飫人心鄙夫寬薄夫敦雅有上皇風則和尚又以佛子肝腸具轉世道之微權不類小泥洹徒以因緣攬局面其為功於諸佛諸祖更為功於土地里居且為功於聖天子也嗟乎大法零落拄杖叢林逞青黃之面皮衒聽聞之鐘鼓賣狗懸羊勢不相下我純和尚豎眉刮心力矯濫觸至今峽城湘漢間衲子領其宗匠人民佩其盛德雖云示寂遺瓢尚存正未忘其為純備和尚也寧僅衍雙桂宗派乎他如和尚之行由載在行實語録可考勿庸覶縷用草數行以銘不朽銘曰性耽林泉法激人天三千七百直掃風煙舌鋒有劍杖頭無錢栽無根樹撐無底船入世出世身後身前紹衣雙桂早整祖鞭大悲舉拂燈燈衍傳淵源奕葉仰名聖賢
