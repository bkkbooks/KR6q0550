body:
  text: 純備德禪師語錄序一閻浮提降兩聖人東西分化南北風聞假布衣而幽贊王綱捨軒冕而鼓舞黎庶止商之威以助養於生生導春風之和用飾喜於元元其教澤流注千古沛然莫之能禦也第學鄹魯者以存心養性為談柄學指月者以明心見性為口籍究其踐履天光咀嚼德性如龜毛之服兔角之梯不惟舉世罕逢即曠代亦未之聞也吁是不亦說在飛龍之先而行在跛鱉之後與我達磨鼻祖憫聖道之式微迴狂瀾於既倒航海達番適梁如魏開法藥於少室授心印於神光而教外別傳之旨始得揚溢乎神州以致燈燈續焰昭若日星矣我慈雲老人冢孫天圓法兄世嫡純備德公坐斷報化佛頭卻來峽上呈橈恰遇兩大參府睿初傳公鳴山王公善識其人挽入月峽名藍施格外鉗錘煆銅頭鐵額予奪不下臨濟縱橫雅稱楊岐一日持錄入山徵余序弁灼然言與佛符行與祖契方之今據猊床者求其如公之洞然大觀拈提無包攝八荒融通萬有彈指為經掉臂為法亦不多覯矣噫嘻賁我東塔祖風舍吾姪而誰與是以不禁舌木瀾翻偈言曰嚼碎冰輪物外遊眼光爍破四神洲而今把斷黃牛峽不放狂瀾泙湃流時康熙庚戌三月上巳古庭道隆博達題於青林之梅桂幢原書闕聯芳詩偈佛事塔銘純備德禪師語錄目次
